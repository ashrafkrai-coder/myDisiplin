<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f766e" />
  <script src="assets/auth.js"></script>
  <script>
    if (window.myDisiplinAuth) window.myDisiplinAuth.requireAuth();
  </script>
  <title>myDisiplin - Terima Kongsi</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon32.png" type="image/png" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(120deg, #d1fae5, #ecfeff);
      color: #0f172a;
      padding: 16px;
    }
    main {
      width: min(92vw, 720px);
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
    }
    h1 { margin-top: 0; color: #0f766e; }
    pre {
      background: #f8fafc;
      border-radius: 12px;
      padding: 12px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    a { color: #0f766e; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <main>
    <a href="index.html">&larr; Kembali ke Utama</a>
    <h1>Data Perkongsian Diterima</h1>
    <p>Halaman ini menerima data daripada fungsi kongsi pelayar (Web Share Target).</p>
    <pre id="result">Tiada data diterima.</pre>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const data = {
      tajuk: params.get("title") || "",
      teks: params.get("text") || "",
      url: params.get("url") || ""
    };
    const hasData = data.tajuk || data.teks || data.url;
    document.getElementById("result").textContent = hasData
      ? JSON.stringify(data, null, 2)
      : "Tiada data diterima.";
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }
  </script>
</body>
</html>
