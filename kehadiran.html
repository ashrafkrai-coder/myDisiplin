<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f766e" />
  <script src="/assets/auth.js"></script>
  <script>
    if (window.myDisiplinAuth) window.myDisiplinAuth.requireAuth();
  </script>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="myDisiplin" />
  <title>myDisiplin - Kehadiran</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon32.png" type="image/png" />
  <link rel="apple-touch-icon" href="/icons/icon180.png" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(120deg, #d1fae5, #ecfeff);
      color: #0f172a;
      padding: 16px;
    }
    main {
      width: min(92vw, 700px);
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
    }
    h1 { margin-top: 0; color: #0f766e; }
    a { color: #0f766e; text-decoration: none; font-weight: 600; }
    .card {
      background: #f8fafc;
      border-radius: 12px;
      padding: 14px;
      margin: 12px 0;
    }
  </style>
</head>
<body>
  <main>
    <a href="/">&larr; Kembali ke Utama</a>
    <h1>Semak Kehadiran</h1>
    <div class="card">
      <strong>Hari ini</strong>
      <p>Masuk: 07:55</p>
      <p>Pulang: 17:10</p>
      <p>Status: Tepat masa</p>
    </div>
    <div class="card">
      <strong>Ringkasan Mingguan</strong>
      <p>Hadir: 5/5 hari</p>
      <p>Purata ketibaan: 07:58</p>
    </div>
  </main>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").catch(() => {});
    }
  </script>
</body>
</html>
